<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08">
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="#fff"/>
    </pattern>
    <rect width="1200" height="300" fill="url(#dots)"/>
  </g>

  <!-- Decorative accent line -->
  <rect x="60" y="260" width="1080" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Document icon -->
  <g transform="translate(90, 80)" filter="url(#shadow)">
    <rect x="0" y="0" width="100" height="130" rx="8" fill="#1e1b4b" stroke="url(#accent)" stroke-width="2"/>
    <rect x="16" y="18" width="50" height="4" rx="2" fill="#00d2ff" opacity="0.7"/>
    <rect x="16" y="30" width="68" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <rect x="16" y="40" width="60" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
    <rect x="16" y="50" width="68" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <rect x="16" y="60" width="55" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
    <rect x="16" y="76" width="40" height="4" rx="2" fill="#7b2ff7" opacity="0.6"/>
    <rect x="16" y="88" width="68" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <rect x="16" y="98" width="62" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
    <rect x="16" y="108" width="68" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <!-- Sparkle / AI indicator -->
    <circle cx="78" cy="18" r="10" fill="url(#accent)" opacity="0.8" filter="url(#glow)"/>
    <text x="78" y="22" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">AI</text>
  </g>

  <!-- Main title -->
  <text x="240" y="135" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="url(#text-grad)" filter="url(#shadow)">
    CV Generator
  </text>

  <!-- Subtitle -->
  <text x="244" y="175" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#94a3b8" letter-spacing="1.5">
    AI-Powered · ATS-Optimized · Open Source
  </text>

  <!-- Badge: ATS -->
  <g transform="translate(244, 198)">
    <rect width="80" height="28" rx="14" fill="#065f46" opacity="0.8"/>
    <text x="40" y="18" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">✓ ATS</text>
  </g>

  <!-- Badge: AI -->
  <g transform="translate(334, 198)">
    <rect width="100" height="28" rx="14" fill="#1e1b4b" opacity="0.8" stroke="url(#accent)" stroke-width="1"/>
    <text x="50" y="18" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#a5b4fc">⚡ AI Free</text>
  </g>

  <!-- Badge: PDF -->
  <g transform="translate(444, 198)">
    <rect width="90" height="28" rx="14" fill="#7c2d12" opacity="0.6"/>
    <text x="45" y="18" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#fdba74">📄 PDF</text>
  </g>

  <!-- Right side decorative element: abstract shapes -->
  <g transform="translate(950, 60)" opacity="0.15">
    <circle cx="60" cy="40" r="80" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <circle cx="60" cy="40" r="50" fill="none" stroke="url(#accent)" stroke-width="1"/>
    <circle cx="60" cy="40" r="20" fill="url(#accent)" opacity="0.3"/>
  </g>

  <!-- Floating particles -->
  <circle cx="870" cy="70" r="3" fill="#00d2ff" opacity="0.4">
    <animate attributeName="cy" values="70;55;70" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1020" cy="140" r="2.5" fill="#7b2ff7" opacity="0.5">
    <animate attributeName="cy" values="140;125;140" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="90" r="2" fill="#00d2ff" opacity="0.3">
    <animate attributeName="cy" values="90;78;90" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="940" cy="200" r="2.5" fill="#c4b5fd" opacity="0.4">
    <animate attributeName="cy" values="200;188;200" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
