# SonarQube Configuration for CV Generator
# Uncomment and configure when SonarQube server is available
#
# sonar.projectKey=tiarh_cv-generator
# sonar.projectName=CV Generator
# sonar.projectVersion=1.0.0
#
# sonar.organization=tiarh
# sonar.host.url=https://sonarcloud.io
#
# # Source directories
# sonar.sources=src,.
# sonar.tests=tests
# sonar.test.inclusions=**/*test*,**/*spec*
#
# # Language-specific
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.python.version=3.11
#
# # Exclusions
# sonar.exclusions=**/node_modules/**,**/.venv/**,**/dist/**,**/db/**,**/__pycache__/**,node_modules/**
# sonar.coverage.exclusions=**/node_modules/**,**/views/**,**/public/**,**/templates/**,**/assets/**,**/screenshots/**
#
# # Quality gates
# sonar.qualitygate.wait=true
#
# # Pull request decoration (requires GitHub integration)
# sonar.pullrequest.provider=GitHub
# sonar.pullrequest.github.repository=tiarh/cv-generator
