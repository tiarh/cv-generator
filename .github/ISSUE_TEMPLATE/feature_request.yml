name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make CV Generator better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? What's frustrating without it?
      placeholder: "I can't customize the color scheme of my CV template, so every resume looks the same."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you imagine this working?
      placeholder: "Add a color picker in the template customization panel that changes the accent color of the selected template."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you thought about?
      placeholder: "I tried editing the template HTML directly, but it gets overwritten on regeneration."

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area does this affect?
      options:
        - Templates / Design
        - AI Content Generation
        - PDF Export
        - UI / UX
        - API / Backend
        - DevOps / Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, examples from other tools, or anything else that helps explain
