name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/ --ignore-pattern 'node_modules' || true

      - name: Health check test
        run: |
          node src/server.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:8083/health || (kill $SERVER_PID 2>/dev/null; exit 1)
          kill $SERVER_PID 2>/dev/null
          echo "✅ Health check passed"

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: cv-generator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image runs
        run: |
          docker run -d --name cv-test -p 8084:8083 -e PORT=8083 cv-generator:ci
          sleep 5
          curl -sf http://localhost:8084/health || (docker logs cv-test; exit 1)
          docker stop cv-test
          echo "✅ Docker image verified"
